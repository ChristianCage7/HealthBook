<ion-header>
  <ion-toolbar>
    <ion-title>Mi perfil</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="logoutConfirm()">
        <ion-icon name="log-out-sharp" slot="start" ></ion-icon>
        <ion-label>Cerrar sesión</ion-label>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>


<ion-content class="ion-padding">

  ¡Hola Usuario!

  <ion-list>

    <ion-item button>
      <ion-icon name="settings-outline" slot="start"></ion-icon>
      <ion-label>Configuración</ion-label>
    </ion-item>

    <ion-item button>
      <ion-icon name="create-outline" slot="start"></ion-icon>
      <ion-label>Editar perfil</ion-label>
    </ion-item>

    <ion-item button>
      <ion-icon name="time-outline" slot="start"></ion-icon>
      <ion-label>Historial</ion-label>
    </ion-item>

    <ion-item button>
      <ion-icon name="document-text-outline" slot="start"></ion-icon>
      <ion-label>Términos de servicio</ion-label>
    </ion-item>

    <ion-item button>
      <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
      <ion-label>Política de privacidad</ion-label>
    </ion-item>


    <ion-item button color="danger">
      <ion-icon name="trash-outline" slot="start"></ion-icon>
      <ion-label>Eliminar cuenta</ion-label>
    </ion-item>
  </ion-list>

</ion-content>
