<ion-header>
  <ion-toolbar>
    <ion-title>Registrarse</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="register()">
    <ion-item>
      <ion-label position="floating">Nombre completo</ion-label>
      <ion-input formControlName="name"></ion-input>
    </ion-item>
    <ion-text color="danger" *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
      <p>Este campo es obligatorio.</p>
    </ion-text>

    <ion-item>
      <ion-label position="floating">Correo electrónico</ion-label>
      <ion-input type="email" formControlName="email"></ion-input>
    </ion-item>
    <ion-text color="danger" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
      <p *ngIf="form.get('email')?.errors?.['required']">Este campo es obligatorio.</p>
      <p *ngIf="form.get('email')?.errors?.['email']">Correo no válido.</p>
    </ion-text>

    <ion-item>
      <ion-label position="floating">Contraseña</ion-label>
      <ion-input type="password" formControlName="password"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Confirmar contraseña</ion-label>
      <ion-input type="password" formControlName="confirmPassword"></ion-input>
    </ion-item>
    <ion-text color="danger" *ngIf="form.get('confirmPassword')?.touched && form.value.password !== form.value.confirmPassword">
      <p>Las contraseñas no coinciden.</p>
    </ion-text>

    <ion-button expand="block" type="submit" class="ion-margin-top">Registrarse</ion-button>
  </form>
</ion-content>
