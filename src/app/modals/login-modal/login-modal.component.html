<ion-header>
  <ion-toolbar>
    <ion-title>Iniciar sesión</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="login()">
    <ion-item>
      <ion-label position="floating">Correo electrónico</ion-label>
      <ion-input type="email" formControlName="email"></ion-input>
    </ion-item>
    <ion-text color="danger" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
      <p *ngIf="form.get('email')?.errors?.['required']">Este campo es obligatorio.</p>
      <p *ngIf="form.get('email')?.errors?.['email']">Correo no válido.</p>
    </ion-text>

    <ion-item>
      <ion-label position="floating">Contraseña</ion-label>
      <ion-input type="password" formControlName="password"></ion-input>
    </ion-item>
    <ion-text color="danger" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
      <p *ngIf="form.get('password')?.errors?.['required']">Este campo es obligatorio.</p>
      <p *ngIf="form.get('password')?.errors?.['minlength']">Mínimo 6 caracteres.</p>
    </ion-text>

    <ion-button expand="block" type="submit" class="ion-margin-top" (click)="viewMain()">Iniciar sesión</ion-button>
  </form>
</ion-content>
